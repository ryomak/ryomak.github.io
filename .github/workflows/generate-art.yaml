name: Generate p5go Art

on:
  schedule:
    # 毎週日曜日の午前9時（JST）に実行
    - cron: "0 0 * * 0"
  workflow_dispatch:
    inputs:
      theme:
        description: "Art theme (leave empty for random)"
        required: false
        type: string
      art_name:
        description: "Art name (leave empty for date-based name)"
        required: false
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install dependencies
        run: yarn install

      - name: Generate art code with AI
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ART_THEME: "${{ github.event.inputs.theme }}"
          ART_NAME: "${{ github.event.inputs.art_name }}"
        run: npx tsx scripts/generate-art.ts

      - name: Build WASM
        env:
          ART_NAME: "${{ steps.generate.outputs.art_name }}"
        run: |
          make go-build ART_NAME="$ART_NAME"

      - name: Install Puppeteer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Start dev server and generate GIF
        env:
          ART_NAME: "${{ steps.generate.outputs.art_name }}"
        run: |
          # Start dev server in background
          yarn dev &
          DEV_PID=$!

          # Wait for server to be ready
          echo "Waiting for dev server..."
          for i in {1..30}; do
            if curl -s http://localhost:4321 > /dev/null; then
              echo "Dev server is ready!"
              break
            fi
            sleep 2
          done

          # Generate GIF
          ./scripts/art_gif.sh go "$ART_NAME"

          # Kill dev server
          kill $DEV_PID || true

      - name: Verify generated files
        env:
          ART_NAME: "${{ steps.generate.outputs.art_name }}"
        run: |
          echo "Checking generated files..."
          ls -la "art/go/$ART_NAME/"
          ls -la "public/wasm/go_${ART_NAME}.wasm"
          ls -la "public/art/go/$ART_NAME/art.gif"

      - name: Create branch and commit
        id: commit
        env:
          ART_NAME: "${{ steps.generate.outputs.art_name }}"
          ART_THEME: "${{ steps.generate.outputs.art_theme }}"
          ART_DATE: "${{ steps.generate.outputs.art_date }}"
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="art/$ART_NAME"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

          # Create new branch
          git checkout -b "$BRANCH_NAME"

          # Add all generated files
          git add "art/go/$ART_NAME/"
          git add art/data/data.ts
          git add "public/wasm/go_${ART_NAME}.wasm"
          git add "public/art/go/$ART_NAME/"

          # Commit
          git commit -m "feat: add generated art '$ART_NAME'

          Theme: $ART_THEME
          Date: $ART_DATE

          Generated by GitHub Actions"

          # Push
          git push -u origin "$BRANCH_NAME"

      - name: Create Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ART_NAME: "${{ steps.generate.outputs.art_name }}"
          ART_THEME: "${{ steps.generate.outputs.art_theme }}"
          ART_DATE: "${{ steps.generate.outputs.art_date }}"
          BRANCH_NAME: "${{ steps.commit.outputs.branch_name }}"
          REPO: "${{ github.repository }}"
        run: |
          gh pr create \
            --title "feat: Add generated art '$ART_NAME'" \
            --body "## Generated Art

          **Name:** $ART_NAME
          **Theme:** $ART_THEME
          **Date:** $ART_DATE

          ### Preview
          ![Art Preview](https://raw.githubusercontent.com/$REPO/$BRANCH_NAME/public/art/go/$ART_NAME/art.gif)

          ### Generated Files
          - \`art/go/$ART_NAME/main.go\` - Source code
          - \`public/wasm/go_${ART_NAME}.wasm\` - Compiled WASM
          - \`public/art/go/$ART_NAME/art.gif\` - Preview GIF

          ---
          Generated by [generate-art workflow](https://github.com/$REPO/actions/workflows/generate-art.yaml)" \
            --base master \
            --head "$BRANCH_NAME"
